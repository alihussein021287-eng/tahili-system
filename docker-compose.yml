services:
  # قاعدة البيانات
  postgres:
    image: postgres:16-alpine
    container_name: tahili_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?set DB_USER in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:?set DB_NAME in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  # تخزين المرفقات والصور
  minio:
    image: minio/minio:latest
    container_name: tahili_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:?set MINIO_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?set MINIO_PASSWORD in .env}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  # تطبيق Next.js (الواجهة + الـ API)
  app:
    build: .
    container_name: tahili_app
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    environment:
      DATABASE_URL: postgresql://${DB_USER:?set DB_USER in .env}:${DB_PASSWORD:?set DB_PASSWORD in .env}@postgres:5432/${DB_NAME:?set DB_NAME in .env}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?set NEXTAUTH_URL in .env}
      NEXTAUTH_ALLOW_HTTP_LOGIN: ${NEXTAUTH_ALLOW_HTTP_LOGIN:-false}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?set ADMIN_INITIAL_PASSWORD in .env}
      ALLOW_INITIAL_SETUP: ${ALLOW_INITIAL_SETUP:-false}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_USER:?set MINIO_USER in .env}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:?set MINIO_PASSWORD in .env}
      UPLOAD_DIR: /app/uploads
      TZ: Asia/Baghdad
      REMINDER_KEY: ${REMINDER_KEY:?set REMINDER_KEY in .env}
    volumes:
      - uploads:/app/uploads
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
  uploads:
